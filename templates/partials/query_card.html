<!-- templates/partials/query_card.html -->
      <div class="card" id="query-section">
        <div class="ask-row">
          <div class="input-wrap">
            <label for="question-input">Ask a question about your data</label>
            <input
              type="text"
              id="question-input"
              placeholder='e.g. "show female patients older than 30 from Dhaka"'
              autocomplete="off"
            />
          </div>
          <button id="ask-btn">Ask</button>
        </div>

        <div id="sql-block">
          <div style="margin-top: 20px">
            <div class="sql-label">Generated SQL</div>
            <div class="intent-badge" id="intent-label"></div>
            <div class="sql-code" id="sql-output"></div>
          </div>
        </div>

        <div id="error-box" class="error-box" style="display: none"></div>

        <div id="results-block">
          <div class="sql-label" style="margin-top: 20px">Query Results</div>
          <div class="results-meta" id="results-meta"></div>
          <div class="table-wrap">
            <table id="results-table">
              <thead id="results-thead"></thead>
              <tbody id="results-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
